name: Weekly Price Scraper

on:
  schedule:
    # Every Sunday at 3:00am UTC
    - cron: '0 3 * * 0'
  workflow_dispatch:
    inputs:
      stale_days:
        description: 'Re-scrape editions not updated in this many days'
        default: '7'
        required: false
      limit:
        description: 'Max editions to scrape per run'
        default: '2000'
        required: false

jobs:
  scrape-prices:
    name: Scrape Mercari prices
    runs-on: ubuntu-latest
    timeout-minutes: 320

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Puppeteer Chrome
        run: npx puppeteer browsers install chrome

      - name: Run Mercari price scraper
        run: |
          STALE=${{ github.event.inputs.stale_days || '7' }}
          LIMIT=${{ github.event.inputs.limit || '2000' }}
          echo "Scraping editions older than ${STALE} days (limit: ${LIMIT})"
          node scripts/scrape-mercari-puppeteer.mjs --stale=${STALE} --limit=${LIMIT}
        env:
          CI: true

      - name: Summary
        if: always()
        run: echo "Scrape complete. Check output above for priced/skipped/error counts."
